services:

  mongodb:
    image: mongo:7
    container_name: oss_sentinel_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: oss_sentinel

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oss_sentinel_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app          # hot-reload in dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oss_sentinel_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend

volumes:
  mongo_data:
